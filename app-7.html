<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Neon Hunt</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            background-color: #090a0f;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .game-container {
            width: 100%;
            max-width: 480px;
            padding: 15px;
            text-align: center;
        }
        header {
            margin-bottom: 10px;
        }
        h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #00f0ff;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.6);
            text-transform: uppercase;
        }
        .dashboard {
            display: flex;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 240, 255, 0.1);
            padding: 8px 15px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 14px;
            font-weight: bold;
        }
        .score-box {
            color: #ff007f;
            text-shadow: 0 0 8px rgba(255, 0, 127, 0.5);
        }
        .high-score-box {
            color: #ffcc00;
            text-shadow: 0 0 8px rgba(255, 204, 0, 0.5);
        }
        canvas {
            background: #11131e;
            display: block;
            margin: 0 auto;
            border: 2px solid #00f0ff;
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.25);
            max-width: 100%;
            touch-action: none;
        }
        /* Virtual Joystick Styles */
        .joystick-wrapper {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #joystick-container {
            position: relative;
            width: 130px;
            height: 130px;
            background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, rgba(0,240,255,0.05) 100%);
            border: 3px solid #00f0ff;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.15), inset 0 0 15px rgba(0, 240, 255, 0.1);
            touch-action: none;
        }
        #joystick-knob {
            position: absolute;
            width: 46px;
            height: 46px;
            background: radial-gradient(circle, #ff007f 0%, #a3004f 100%);
            border: 2px solid #ffffff;
            border-radius: 50%;
            top: 39px;
            left: 39px;
            box-shadow: 0 0 12px rgba(255, 0, 127, 0.8);
            cursor: grab;
            transition: transform 0.05s linear;
        }
        #joystick-knob:active {
            cursor: grabbing;
            background: radial-gradient(circle, #ff3399 0%, #ff007f 100%);
        }
        .instructions {
            font-size: 11px;
            color: #666a80;
            margin-top: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="game-container">
    <header>
        <h1>Cyber Neon Hunt</h1>
    </header>

    <div class="dashboard">
        <div class="score-box">COINS: <span id="current-score">0</span></div>
        <div class="high-score-box">BEST: <span id="high-score">0</span></div>
    </div>

    <canvas id="gameViewport" width="400" height="400"></canvas>

    <div class="joystick-wrapper">
        <div id="joystick-container">
            <div id="joystick-knob"></div>
        </div>
    </div>
    
    <div class="instructions">Joystick ko drag karein ya mouse se player control karein</div>
</div>

<script>
    const canvas = document.getElementById("gameViewport");
    const ctx = canvas.getContext("2d");
    const scoreText = document.getElementById("current-score");
    const highScoreText = document.getElementById("high-score");

    // Game Metrics & Engine states
    let score = 0;
    
    // PHP ki jagah LocalStorage se high score load karna
    let highScore = localStorage.getItem("cyber_high_score") ? parseInt(localStorage.getItem("cyber_high_score")) : 0;
    highScoreText.innerText = highScore;
    
    // Player aur Coin ki properties
    const player = { x: 200, y: 200, radius: 10, speed: 4.5, dx: 0, dy: 0 };
    const targetToken = { x: 0, y: 0, radius: 7 };

    // Coin ko random jagah spawn karne ka function
    function randomizeToken() {
        targetToken.x = Math.max(targetToken.radius, Math.min(canvas.width - targetToken.radius, Math.random() * canvas.width));
        targetToken.y = Math.max(targetToken.radius, Math.min(canvas.height - targetToken.radius, Math.random() * canvas.height));
    }
    randomizeToken();

    // Joystick Logic
    const joyContainer = document.getElementById("joystick-container");
    const joyKnob = document.getElementById("joystick-knob");
    let isJoystickEngaged = false;
    const maxBoundRadius = 42; 

    function executeMovementLogic(pointerX, pointerY) {
        const bounds = joyContainer.getBoundingClientRect();
        const pivotX = bounds.left + bounds.width / 2;
        const pivotY = bounds.top + bounds.height / 2;
        
        let offsetX = pointerX - pivotX;
        let offsetY = pointerY - pivotY;
        let magnitude = Math.sqrt(offsetX * offsetX + offsetY * offsetY);

        if (magnitude > maxBoundRadius) {
            offsetX = (offsetX / magnitude) * maxBoundRadius;
            offsetY = (offsetY / magnitude) * maxBoundRadius;
            magnitude = maxBoundRadius;
        }

        joyKnob.style.transform = `translate(${offsetX}px, ${offsetY}px)`;

        // Speed and direction calculations
        player.dx = (offsetX / maxBoundRadius) * player.speed;
        player.dy = (offsetY / maxBoundRadius) * player.speed;
    }

    function killJoystickEngagement() {
        isJoystickEngaged = false;
        joyKnob.style.transform = "translate(0px, 0px)";
        player.dx = 0;
        player.dy = 0;
    }

    // Touch events for Mobile Phones
    joyContainer.addEventListener("touchstart", (e) => { 
        isJoystickEngaged = true; 
        executeMovementLogic(e.touches[0].clientX, e.touches[0].clientY); 
    }, {passive: true});
    
    window.addEventListener("touchmove", (e) => { 
        if (isJoystickEngaged) executeMovementLogic(e.touches[0].clientX, e.touches[0].clientY); 
    }, {passive: true});
    
    window.addEventListener("touchend", killJoystickEngagement);

    // Mouse events for Laptops/PC
    joyContainer.addEventListener("mousedown", (e) => { 
        isJoystickEngaged = true; 
        executeMovementLogic(e.clientX, e.clientY); 
    });
    
    window.addEventListener("mousemove", (e) => { 
        if (isJoystickEngaged) executeMovementLogic(e.clientX, e.clientY); 
    });
    
    window.addEventListener("mouseup", killJoystickEngagement);

    // Score update aur LocalStorage mein save karne ka function
    function saveHighScoreLocal(currentPoints) {
        if (currentPoints > highScore) {
            highScore = currentPoints;
            localStorage.setItem("cyber_high_score", highScore);
            highScoreText.innerText = highScore;
        }
    }

    // Game Main Loop
    function loop() {
        // Player position update
        player.x += player.dx;
        player.y += player.dy;

        // Screen boundaries check
        if (player.x - player.radius < 0) player.x = player.radius;
        if (player.x + player.radius > canvas.width) player.x = canvas.width - player.radius;
        if (player.y - player.radius < 0) player.y = player.radius;
        if (player.y + player.radius > canvas.height) player.y = canvas.height - player.radius;

        // Collision Check (Player ne coin touch kiya ya nahi)
        const distVectorX = player.x - targetToken.x;
        const distVectorY = player.y - targetToken.y;
        const netDistance = Math.sqrt(distVectorX * distVectorX + distVectorY * distVectorY);

        if (netDistance < player.radius + targetToken.radius) {
            score++;
            scoreText.innerText = score;
            randomizeToken();
            saveHighScoreLocal(score); // Local storage update
        }

        // Canvas drawing start
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Background grid effect (Retro look)
        ctx.strokeStyle = "rgba(0, 240, 255, 0.02)";
        ctx.lineWidth = 1;
        for (let i = 0; i < canvas.width; i += 25) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
        }

        // Player render (Neon Blue Glow Circle)
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
        ctx.fillStyle = "#00f0ff";
        ctx.shadowBlur = 12;
        ctx.shadowColor = "#00f0ff";
        ctx.fill();
        ctx.closePath();

        // Coin render (Neon Gold Circle)
        ctx.beginPath();
        ctx.arc(targetToken.x, targetToken.y, targetToken.radius, 0, Math.PI * 2);
        ctx.fillStyle = "#ffcc00";
        ctx.shadowBlur = 15;
        ctx.shadowColor = "#ffcc00";
        ctx.fill();
        ctx.closePath();

        // Canvas shadow reset optimization ke liye
        ctx.shadowBlur = 0;

        requestAnimationFrame(loop);
    }

    // Game boot-up
    loop();
</script>

</body>
</html>
